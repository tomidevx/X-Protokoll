<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cayo Aktensystem</title>
  <meta name="description" content="" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
  </script>
  <script>
  if(sessionStorage.getItem('loggedIn') !== 'true'){
    window.location.href = "index.html";
  }
</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html { scroll-behavior: smooth; }
    input[type=file] { display: none; }

  </style>
</head>
<body class="bg-black text-white min-h-screen">
  <div class="min-h-screen max-w-7xl mx-auto px-4 py-6">
    <header class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-3 mb-6">
      <div class="flex items-center gap-3">
        <i class="fas fa-shield-alt text-4xl text-green-400"></i>
        <div>
          <h1 class="text-4xl font-bold tracking-tight text-white">Cayo  Aktensystem</h1>
          <p class="text-sm text-gray-400">FiveM Roleplay - Aktenverwaltung</p>
          <p class="text-xs text-gray-500">Angemeldet als: <span id="userDisplay"></span></p>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        <button id="btnConfig" class="px-4 py-2 rounded-2xl bg-gray-700 text-white shadow hover:bg-gray-600 transition duration-200">
          <i class="fas fa-cog mr-2"></i>Verbinden
        </button>
        <button id="btnAdd" class="px-4 py-2 rounded-2xl bg-gray-800 text-white shadow hover:bg-gray-700 transition duration-200">
          <i class="fas fa-plus mr-2"></i>Neue Person
        </button>
        <label for="importFile" class="px-4 py-2 rounded-2xl bg-gray-900 border border-gray-600 shadow hover:bg-gray-800 cursor-pointer transition duration-200">
          <i class="fas fa-upload mr-2"></i>Backup Laden
        </label>
        <input id="importFile" type="file" accept="application/json" />
        <button id="btnExport" class="px-4 py-2 rounded-2xl bg-gray-900 border border-gray-600 shadow hover:bg-gray-800 transition duration-200">
          <i class="fas fa-download mr-2"></i>Backup Ziehen
        </button>
        <button id="btnReset" class="px-4 py-2 rounded-2xl bg-red-800 text-red-100 border border-red-700 hover:bg-red-700 transition duration-200">
          <i class="fas fa-trash mr-2"></i>Alles löschen
        </button>
        <a href="logauswahl.html" class="px-4 py-2 rounded-2xl bg-gray-700 text-white shadow hover:bg-gray-600 transition duration-200">
          <i class="fas fa-list mr-2"></i>Logs
        </a>
      </div>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
      <div class="col-span-2 flex items-center gap-2">
        <input id="search" type="search" placeholder="Suche nach Name, Telefon, Fraktion, Einträgen…" class="w-full px-4 py-2 rounded-2xl border border-gray-600 shadow bg-gray-900 text-white focus:outline-none focus:ring focus:ring-green-500" />
      </div>
      <div class="flex items-center gap-2 justify-between md:justify-end">
        <select id="sortBy" class="px-3 py-2 rounded-2xl border border-gray-600 bg-gray-900 text-white shadow">
          <option value="name-asc">Name A–Z</option>
          <option value="name-desc">Name Z–A</option>
          <option value="updatedAt-desc">Zuletzt geändert ↓</option>
          <option value="updatedAt-asc">Zuletzt geändert ↑</option>
          <option value="createdAt-desc">Erstellt ↓</option>
          <option value="createdAt-asc">Erstellt ↑</option>
        </select>
        <span id="count" class="text-sm text-gray-400"></span>
      </div>
    </section>

    <section class="bg-gray-900 rounded-2xl shadow overflow-hidden border border-gray-700">
      <div class="overflow-x-auto">
        <table class="min-w-full border-collapse">
          <thead class="bg-gray-800 text-left text-sm">
            <tr>
              <th class="px-4 py-3 text-green-400"><i class="fas fa-user mr-1"></i>Name</th>
              <th class="px-4 py-3 text-green-400"><i class="fas fa-phone mr-1"></i>Telefon</th>
              <th class="px-4 py-3 text-green-400"><i class="fas fa-users mr-1"></i>Fraktion</th>
              <th class="px-4 py-3 text-green-400"><i class="fas fa-clock mr-1"></i>Geändert</th>
              <th class="px-4 py-3 text-green-400"><i class="fas fa-cogs mr-1"></i>Aktionen</th>
            </tr>
          </thead>
          <tbody id="tableBody" class="text-sm"></tbody>
        </table>
      </div>
    </section>

    <dialog id="detailDialog" class="w-full max-w-5xl rounded-2xl p-0 bg-black border border-gray-700">
      <form method="dialog" class="p-4 flex justify-between items-start border-b border-gray-600 bg-gray-900 text-white">
        <h3 class="text-lg font-semibold text-green-400">Akte: <span id="detailName"></span></h3>
        <button class="px-3 py-1 rounded-xl bg-gray-700 hover:bg-gray-600 text-white transition duration-200">Schließen</button>
      </form>
      <div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-4 bg-black text-white">
        <div class="md:col-span-1">
          <div class="bg-gray-900 rounded-xl p-3 border border-gray-600">
            <dl class="text-sm space-y-2">
              <div>
                <dt class="text-gray-400"><i class="fas fa-phone mr-1"></i>Telefon</dt>
                <dd id="detailPhone" class="font-medium"></dd>
              </div>
              <div>
                <dt class="text-gray-400"><i class="fas fa-map-marker-alt mr-1"></i>Adresse</dt>
                <dd id="detailAddress" class="font-medium whitespace-pre-wrap"></dd>
              </div>
              <div>
                <dt class="text-gray-400"><i class="fas fa-users mr-1"></i>Fraktion</dt>
                <dd id="detailNotes" class="font-medium whitespace-pre-wrap"></dd>
              </div>
              <div>
                <dt class="text-gray-400"><i class="fas fa-calendar-plus mr-1"></i>Erstellt</dt>
                <dd id="detailCreated" class="font-medium"></dd>
              </div>
              <div>
                <dt class="text-gray-400"><i class="fas fa-edit mr-1"></i>Zuletzt geändert</dt>
                <dd id="detailUpdated" class="font-medium"></dd>
              </div>
            </dl>
          </div>
        </div>
        <div class="md:col-span-2">
          <div class="flex flex-col gap-3 mb-2 md:flex-row md:items-center md:justify-between">
            <div>
              <h4 class="font-semibold text-green-400"><i class="fas fa-file-alt mr-1"></i>Einträge</h4>
              <p class="text-xs text-gray-400">Suche nach Einträgen oder filtere nach Typ.</p>
            </div>
            <div class="flex flex-wrap gap-2 items-center">
              <input id="logSearch" type="search" placeholder="Einträge durchsuchen…" class="px-3 py-2 rounded-2xl bg-gray-900 border border-gray-700 text-white text-sm w-full md:w-64 focus:outline-none focus:ring focus:ring-green-500" />
              <select id="entryFilter" class="px-2 py-2 rounded-2xl bg-gray-900 border border-gray-600 text-white text-sm">
                <option value="all">Alle</option>
                <option value="Notiz">Notizen</option>
                <option value="Verhaftung">Verhaftungen</option>
                <option value="Vorladung">Vorladungen</option>
                <option value="Bericht">Berichte</option>
                <option value="Sonstiges">Sonstiges</option>
              </select>
              <button id="btnAddLog" class="px-3 py-2 rounded-2xl bg-green-600 text-white hover:bg-green-700 transition duration-200">
                <i class="fas fa-plus mr-1"></i>Neuer Eintrag
              </button>
            </div>
          </div>
          <div id="logList" class="grid grid-cols-1 lg:grid-cols-3 xl:grid-cols-4 gap-2 max-h-[30rem] overflow-y-auto pr-1"></div>
        </div>
      </div>
    </dialog>

    <dialog id="editDialog" class="w-full max-w-2xl rounded-2xl p-0 bg-black border border-gray-700">
      <form method="dialog" class="p-4 flex justify-between items-start border-b border-gray-600 bg-gray-900 text-white">
        <h3 id="editTitle" class="text-lg font-semibold text-green-400">Neue Person</h3>
        <button class="px-3 py-1 rounded-xl bg-gray-700 hover:bg-gray-600 text-white transition duration-200">Abbrechen</button>
      </form>
      <div class="p-4 bg-black text-white">
        <form id="editForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="hidden" name="id" />
          <div>
            <label class="block text-sm text-gray-400 mb-1"><i class="fas fa-user mr-1"></i>Name *</label>
            <input name="name" required placeholder="Vor- und Nachname" class="w-full px-3 py-2 rounded-xl border border-gray-600 bg-gray-900 text-white focus:outline-none focus:ring focus:ring-green-500" />
          </div>
          <div>
            <label class="block text-sm text-gray-400 mb-1"><i class="fas fa-phone mr-1"></i>Telefon</label>
            <input name="phone" placeholder="z. B. 1234567" class="w-full px-3 py-2 rounded-xl border border-gray-600 bg-gray-900 text-white focus:outline-none focus:ring focus:ring-green-500" />
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm text-gray-400 mb-1"><i class="fas fa-map-marker-alt mr-1"></i>Adresse</label>
            <textarea name="address" rows="2" placeholder="Straße Nr.PLZ Ort" class="w-full px-3 py-2 rounded-xl border border-gray-600 bg-gray-900 text-white focus:outline-none focus:ring focus:ring-green-500"></textarea>
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm text-gray-400 mb-1"><i class="fas fa-users mr-1"></i>Fraktion</label>
            <textarea name="notes" rows="3" placeholder="z. B. Zugehörigkeit, Infos…" class="w-full px-3 py-2 rounded-xl border border-gray-600 bg-gray-900 text-white focus:outline-none focus:ring focus:ring-green-500"></textarea>
          </div>
          <div class="md:col-span-2 flex justify-end gap-2">
            <button type="submit" class="px-4 py-2 rounded-2xl bg-green-600 text-white hover:bg-green-700 transition duration-200">Speichern</button>
          </div>
        </form>
      </div>
    </dialog>

    <footer class="mt-8 text-center text-xs text-gray-500">
      <p> <i class="fas fa-shield-alt mr-1 text-green-400"></i> <strong class="text-green-400">Cayo Aktensystem</strong> für FiveM FirmaRP</p>
    </footer>
  </div>

  <script>

    const $ = (sel, ctx=document) => ctx.querySelector(sel);
    const fmt = (d) => {
      if (!d) return '';
      try {
        return new Date(d).toLocaleString('de-DE', {
          dateStyle: 'short',
          timeStyle: 'short'
        });
      } catch (err) {
        return String(d);
      }
    };

    let SUPABASE_URL = localStorage.getItem('AKTE_SUPABASE_URL') || '';
    let SUPABASE_ANON = localStorage.getItem('AKTE_SUPABASE_ANON') || '';

    let sb = null;
    function initClient(){
      if(!SUPABASE_URL || !SUPABASE_ANON){
        console.warn('Supabase noch nicht konfiguriert');
        return null;
      }
      try {
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
        return sb;
      } catch (e) {
        console.error('Supabase init fehlgeschlagen', e);
        return null;
      }
    }

    async function configure(){
      const url = prompt('URL', SUPABASE_URL || '');
      if(!url) return;
      const key = prompt('KEY', SUPABASE_ANON || '');
      if(!key) return;
      localStorage.setItem('AKTE_SUPABASE_URL', url.trim());
      localStorage.setItem('AKTE_SUPABASE_ANON', key.trim());
      SUPABASE_URL = url.trim();
      SUPABASE_ANON = key.trim();
      initClient();
      await refresh();
      alert('Verbunden!');
    }

    let state = { records: [], entries: [], search: '', sortBy: 'updatedAt-desc' };
    const tableBody = $('#tableBody');
    const count = $('#count');

    function cleanPhone(v){ if(!v) return ''; return v.replace(/[^+\d]/g,'').replace(/^(0{2})(\d)/,'+$2'); }
    function escapeHtml(s){ return String(s).replace(/[&<>\"]{1}/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

    function parseEntryTitle(title){
      const known = ['Notiz','Verhaftung','Vorladung','Bericht','Sonstiges'];
      if (!title) return { type: 'Sonstiges', title: '' };
      if (title === 'Vorherige Fraktionen') return { type: 'Sonstiges', title };
      const [prefix, ...rest] = title.split(':');
      const raw = rest.join(':').trim();
      if (known.includes(prefix.trim())) {
        return { type: prefix.trim(), title: raw };
      }
      return { type: 'Sonstiges', title };
    }

    function mapPerson(row){
      return {
        id: row.id,
        name: row.name || '',
        phone: row.phone || '',
        address: row.address || '',
        notes: row.notes || '',
        createdAt: row.created_at,
        updatedAt: row.updated_at
      };
    }

    function matchesSearch(r, q){ 
      if(!q) return true; 
      q = q.toLowerCase(); 
      const personMatch = [r.name, r.phone, r.notes, r.address].filter(Boolean).some(x => String(x).toLowerCase().includes(q));
      if(personMatch) return true;
      // Check entries
      const personEntries = state.entries.filter(e => e.person_id === r.id);
      return personEntries.some(e => [e.title, e.text].filter(Boolean).some(x => String(x).toLowerCase().includes(q)));
    }
    function getSorted(records){ const [field,dir]=state.sortBy.split('-'); const mult=dir==='asc'?1:-1; return [...records].sort((a,b)=>{ if(field==='name') return a.name.localeCompare(b.name)*mult; return (new Date(a[field])-new Date(b[field]))*mult; }); }

    async function logAudit(tableName, action, oldData = null, newData = null) {
      const username = sessionStorage.getItem('username') || 'Unbekannt';
      console.log('Logging audit:', tableName, action, username);
      const { error } = await sb.from('audit_logs').insert({
        username,
        table_name: tableName,
        action,
        old_data: oldData ? JSON.stringify(oldData) : null,
        new_data: newData ? JSON.stringify(newData) : null
      });
      if (error) {
        console.error('Audit log failed:', error);
      }
    }

    function render(){
      const filtered = state.records.filter(r=>matchesSearch(r, state.search));
      const rows = getSorted(filtered).map(r => `
        <tr class="border-t border-gray-700 hover:bg-gray-800 transition duration-200">
          <td class="px-4 py-3 font-medium text-white">${escapeHtml(r.name)}</td>
          <td class="px-4 py-3 text-gray-300">${escapeHtml(r.phone||'')}</td>
          <td class="px-4 py-3 text-gray-300">${escapeHtml((r.notes||'').slice(0,80))}${(r.notes&&r.notes.length>80)?'…':''}</td>
          <td class="px-4 py-3 whitespace-nowrap text-gray-300">${fmt(r.updatedAt)}</td>
          <td class="px-4 py-3">
            <div class="flex gap-2">
              <button class="px-3 py-1 rounded-xl bg-gray-900 border border-gray-600 text-white hover:bg-gray-800 transition duration-200" onclick="openDetail('${r.id}')">
                <i class="fas fa-eye mr-1"></i>Details
              </button>
              <button class="px-3 py-1 rounded-xl bg-gray-900 border border-gray-600 text-white hover:bg-gray-800 transition duration-200" onclick="openEdit('${r.id}')">
                <i class="fas fa-edit mr-1"></i>Bearbeiten
              </button>
              <button class="px-3 py-1 rounded-xl bg-red-800 text-red-100 border border-red-700 hover:bg-red-700 transition duration-200" onclick="removeRecord('${r.id}')">
                <i class="fas fa-trash mr-1"></i>Löschen
              </button>
            </div>
          </td>
        </tr>`).join('');
      tableBody.innerHTML = rows || `<tr><td colspan="5" class="px-4 py-6 text-center text-gray-500">Keine Akten vorhanden – klicke auf <strong>Neue Person</strong>.</td></tr>`;
      count.textContent = filtered.length + ' Person' + (filtered.length===1?'':'en');
    }

    async function refresh(){
	
      if(!sb){ render(); return; }
      const { data: persons, error: personsError } = await sb.from('persons').select('*').order('updated_at', { ascending: false });
      if(personsError){ console.error(personsError); alert('Fehler beim Laden: '+personsError.message); return; }
      state.records = persons.map(mapPerson);

      const { data: entries, error: entriesError } = await sb.from('entries').select('*');
      if(entriesError){ console.error(entriesError); } else { state.entries = entries || []; }

      render();
    }

async function createRecord(data){
  if(!sb){ 
    alert('Noch nicht verbunden. Klicke oben auf "Verbinden".'); 
    return; 
  }

  const now = new Date().toISOString();
  const row = { 
    name: data.name.trim(), 
    phone: cleanPhone(data.phone||''), 
    address: (data.address||'').trim(), 
    notes: (data.notes||'').trim(), 
    created_at: now, 
    updated_at: now 
  };

  const { data: inserted, error } = await sb.from('persons')
    .insert(row)
    .select()
    .single();

  if(error){ 
    alert('Speichern fehlgeschlagen: ' + error.message); 
    return; 
  }

  await logAudit('persons', 'INSERT', null, { name: row.name, phone: row.phone, address: row.address, notes: row.notes });

  const { error: logError } = await sb.from('entries').insert({
    person_id: inserted.id,
    title: "Vorherige Fraktionen",
    text: ""
  });

  if(logError){ 
    console.error("Automatischer Eintrag fehlgeschlagen:", logError.message); 
  } else {
    await logAudit('entries', 'INSERT', null, { person_id: inserted.id, title: "Vorherige Fraktionen", text: "" });
  }

  await refresh();
}


    async function updateRecord(id, patch){
      if(!sb){ alert('Nicht verbunden.'); return; }
      const { data: oldRecord, error: fetchError } = await sb.from('persons').select('name, phone, address, notes').eq('id', id).single();
      if(fetchError){ alert('Fehler beim Laden des alten Datensatzes: '+fetchError.message); return; }
      const now = new Date().toISOString();
      const row = { name: patch.name?.trim(), phone: cleanPhone(patch.phone||''), address: (patch.address||'').trim(), notes: (patch.notes||'').trim(), updated_at: now };
      const { error } = await sb.from('persons').update(row).eq('id', id);
      if(error){ alert('Aktualisieren fehlgeschlagen: '+error.message); return; }
      await logAudit('persons', 'UPDATE', oldRecord, { name: row.name, phone: row.phone, address: row.address, notes: row.notes });
      await refresh();
    }

    async function removeRecord(id){
      if(!sb){ alert('Nicht verbunden.'); return; }
      if(!confirm('Diese Akte wirklich löschen?')) return;
      const { data: oldRecord, error: fetchError } = await sb.from('persons').select('name, phone, address, notes').eq('id', id).single();
      if(fetchError){ alert('Fehler beim Laden des alten Datensatzes: '+fetchError.message); return; }
      const { error } = await sb.from('persons').delete().eq('id', id);
      if(error){ alert('Löschen fehlgeschlagen: '+error.message); return; }
      await logAudit('persons', 'DELETE', oldRecord, null);
      await refresh();
    }

const detailDialog = $('#detailDialog');
const logList = $('#logList');
let currentDetailId = null;

const logModal = document.createElement('dialog');
logModal.classList.add('p-4', 'rounded-lg', 'bg-black', 'text-white', 'border', 'border-gray-700');
logModal.style.maxWidth = '90vw';
logModal.style.maxHeight = '80vh';
document.body.appendChild(logModal);

async function openDetail(id){
  const r = state.records.find(x=>x.id===id);
  if(!r) return;
  currentDetailId = id;
  $('#detailName').textContent = r.name;
  $('#detailPhone').textContent = r.phone || '—';
  $('#detailAddress').textContent = r.address || '—';
  $('#detailNotes').textContent = r.notes || '—';
  $('#detailCreated').textContent = fmt(r.createdAt);
  $('#detailUpdated').textContent = fmt(r.updatedAt);
  await renderLogs(r);
  detailDialog.showModal();

  // Add filter and search listeners
  $('#entryFilter').onchange = () => renderLogs(r);
  $('#logSearch').oninput = () => renderLogs(r);
}

async function renderLogs(r) {
  if (!sb) {
    logList.innerHTML = '<li class="text-sm text-gray-400">Nicht verbunden.</li>';
    return;
  }

  const { data, error } = await sb.from('entries')
    .select('*')
    .eq('person_id', r.id)
    .order('created_at', { ascending: false });

  if (error) {
    logList.innerHTML = '<li class="text-sm text-red-400">Fehler beim Laden der Einträge.</li>';
    return;
  }

  let logs = data || [];

  logs.sort((a, b) => {
    if (a.title === 'Vorherige Fraktionen') return -1;
    if (b.title === 'Vorherige Fraktionen') return 1;
    return 0;
  });

  const filter = $('#entryFilter').value;
  const search = ($('#logSearch').value || '').trim().toLowerCase();

  if (filter !== 'all') {
    logs = logs.filter(l => l.title.startsWith(filter));
  }

  if (search) {
    logs = logs.filter(l => {
      const title = String(l.title || '').toLowerCase();
      const text = String(l.text || '').toLowerCase();
      return title.includes(search) || text.includes(search);
    });
  }

  const items = logs.map(l => {
    const isSpecial = l.title === 'Vorherige Fraktionen';
    const parsed = parseEntryTitle(l.title);
    const type = parsed.type;
    const rawTitle = parsed.title || (isSpecial ? l.title : 'Kein Titel');
    const typeStyles = {
      'Notiz': 'bg-yellow-950 border-yellow-700',
      'Verhaftung': 'bg-red-950 border-red-700',
      'Vorladung': 'bg-blue-950 border-blue-700',
      'Bericht': 'bg-green-950 border-green-700',
      'Sonstiges': 'bg-gray-950 border-gray-700'
    };
    const style = typeStyles[type] || 'bg-gray-950 border-gray-700';
    const iconClass = {
      'Notiz': 'fas fa-sticky-note text-yellow-400',
      'Verhaftung': 'fas fa-handcuffs text-red-400',
      'Vorladung': 'fas fa-gavel text-blue-400',
      'Bericht': 'fas fa-file-alt text-green-400',
      'Sonstiges': 'fas fa-question-circle text-gray-400'
    }[type] || 'fas fa-file text-gray-400';
    return `
      <div class="${style} border rounded-3xl p-3 hover:shadow-xl transition duration-200">
        <div class="flex items-start gap-2 mb-2">
          <span class="inline-flex items-center justify-center w-9 h-9 rounded-2xl bg-black/40 text-white">
            <i class="${iconClass}"></i>
          </span>
          <div class="min-w-0">
            <p class="text-[11px] text-gray-400 uppercase tracking-[0.2em]">${escapeHtml(type || 'Eintrag')}</p>
            <h3 class="text-sm font-semibold text-white cursor-pointer hover:text-gray-200 truncate" onclick="showLogModal('${l.id}')">${escapeHtml(rawTitle)}</h3>
            <p class="text-[11px] text-gray-300 mt-1">${fmt(l.created_at)}</p>
          </div>
        </div>
        <div class="mt-3 flex items-center justify-between gap-2">
          <button class="text-[11px] px-2 py-1 rounded-2xl bg-gray-900 border border-gray-700 text-white hover:bg-gray-800 transition duration-200" onclick="showLogModal('${l.id}')">
            <i class="fas fa-eye mr-1"></i>Anzeigen
          </button>
          ${isSpecial ? '' : `<button class="text-[11px] px-2 py-1 rounded-2xl bg-red-800 text-red-100 border border-red-700 hover:bg-red-700 transition duration-200" onclick="deleteLog('${l.id}')">
            <i class="fas fa-trash mr-1"></i>Löschen
          </button>`}
        </div>
      </div>
    `;
  });

  logList.innerHTML = items.join('') || '<li class="text-sm text-gray-400">Noch keine Einträge.</li>';
}

async function addLog(){
  if(!currentDetailId) return;

  logModal.style.width = '620px';
  logModal.style.height = '520px';

  logModal.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-green-400"><i class="fas fa-plus-circle mr-2"></i>Neuer Eintrag</h2>
      <button id="cancelBtn" class="px-3 py-2 rounded-xl bg-gray-700 text-white hover:bg-gray-600 transition duration-200">Abbrechen</button>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-300 mb-1">Art</label>
      <select id="logType" class="w-full p-2 rounded bg-gray-900 text-white border border-gray-600 focus:outline-none focus:ring focus:ring-green-500">
        <option value="Notiz">Test Notiz</option>
        <option value="Verhaftung">Verhaftung</option>
        <option value="Vorladung">Vorladung</option>
        <option value="Bericht">Bericht</option>
        <option value="Sonstiges">Sonstiges</option>
      </select>
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-300 mb-1">Titel</label>
      <input id="logTitle" class="w-full p-2 rounded bg-gray-900 text-white border border-gray-600 focus:outline-none focus:ring focus:ring-green-500" placeholder="Kurze Beschreibung" />
    </div>
    <div class="mb-4">
      <label class="block text-sm font-medium text-gray-300 mb-1">Details</label>
      <textarea id="logText" class="w-full p-2 rounded bg-gray-900 text-white border border-gray-600 focus:outline-none focus:ring focus:ring-green-500" placeholder="Ausführliche Informationen" rows="6"></textarea>
    </div>
    <div class="flex justify-end gap-2">
      <button id="saveBtn" class="px-4 py-2 rounded bg-green-600 hover:bg-green-700 transition duration-200">
        <i class="fas fa-save mr-1"></i>Speichern
      </button>
    </div>
  `;
  logModal.showModal();

  $('#cancelBtn').onclick = () => logModal.close();
  $('#saveBtn').onclick = async () => {
    $('#saveBtn').disabled = true;
    const type = $('#logType').value;
    const titleInput = $('#logTitle').value.trim();
    const text = $('#logText').value.trim();
    const title = titleInput ? `${type}: ${titleInput}` : type;
    if(!text){ alert('Bitte Details ausfüllen'); $('#saveBtn').disabled = false; return; }

    const { error } = await sb.from('entries').insert({ person_id: currentDetailId, title, text });
    if(error){ alert('Eintrag fehlgeschlagen: ' + error.message); $('#saveBtn').disabled = false; return; }

    await logAudit('entries', 'INSERT', null, { person_id: currentDetailId, title, text });

    logModal.close();
    await refresh();
    const rec = state.records.find(x => x.id === currentDetailId);
    if(rec) await renderLogs(rec);
  };
}

async function showLogModal(id){
  const { data, error } = await sb.from('entries').select('*').eq('id', id).single();
  if(error || !data){ return alert('Eintrag nicht gefunden'); }
  const { title, text } = data;

  logModal.style.width = '640px';
  logModal.style.height = '520px';

  logModal.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-green-400">${escapeHtml(title)}</h2>
      <button id="closeBtn" class="px-3 py-2 rounded-xl bg-gray-700 text-white hover:bg-gray-600 transition duration-200">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="h-[calc(100%-100px)] overflow-y-auto rounded-2xl bg-gray-900 p-4 border border-gray-700">
      <p class="text-gray-200 whitespace-pre-wrap">${escapeHtml(text)}</p>
    </div>
    <div class="flex justify-end gap-2 mt-4">
      <button id="editBtn" class="px-3 py-2 rounded-xl bg-green-600 text-white hover:bg-green-700 transition duration-200">Bearbeiten</button>
      <button id="closeBtnSecondary" class="px-3 py-2 rounded-xl bg-gray-700 text-white hover:bg-gray-600 transition duration-200">Schließen</button>
    </div>
  `;
  logModal.showModal();

  $('#closeBtn').onclick = () => logModal.close();
  $('#closeBtnSecondary').onclick = () => logModal.close();
  
  $('#editBtn').onclick = () => editLog(id, title, text);
}

function editLog(id, title, text) {
  const isSpecial = title === 'Vorherige Fraktionen';
  const parsed = parseEntryTitle(title);
  const currentType = parsed.type;
  const rawTitle = parsed.title || (isSpecial ? title : '');

  logModal.style.width = '620px';
  logModal.style.height = '520px';

  logModal.innerHTML = `
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-green-400">Eintrag bearbeiten</h2>
      <button id="cancelBtn" class="px-3 py-2 rounded-xl bg-gray-700 text-white hover:bg-gray-600 transition duration-200">Abbrechen</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Art</label>
        <select id="logType" class="w-full p-3 rounded-2xl bg-gray-900 text-white border border-gray-700 focus:outline-none focus:ring focus:ring-green-500" ${isSpecial ? 'disabled' : ''}>
          <option value="Notiz" ${currentType === 'Notiz' ? 'selected' : ''}>Notiz</option>
          <option value="Verhaftung" ${currentType === 'Verhaftung' ? 'selected' : ''}>Verhaftung</option>
          <option value="Vorladung" ${currentType === 'Vorladung' ? 'selected' : ''}>Vorladung</option>
          <option value="Bericht" ${currentType === 'Bericht' ? 'selected' : ''}>Bericht</option>
          <option value="Sonstiges" ${currentType === 'Sonstiges' ? 'selected' : ''}>Sonstiges</option>
        </select>
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-2">Titel</label>
        <input id="logTitle" class="w-full p-3 rounded-2xl bg-gray-900 text-white border border-gray-700 focus:outline-none focus:ring focus:ring-green-500" value="${escapeHtml(rawTitle)}" ${isSpecial ? 'readonly' : ''} />
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-2">Details</label>
        <textarea id="logText" class="w-full p-3 rounded-2xl bg-gray-900 text-white border border-gray-700 focus:outline-none focus:ring focus:ring-green-500" rows="10">${escapeHtml(text)}</textarea>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-4">
      <button id="saveBtn" class="px-4 py-2 rounded-2xl bg-green-600 text-white hover:bg-green-700 transition duration-200">Speichern</button>
    </div>
  `;

  $('#cancelBtn').onclick = () => logModal.close();
  $('#saveBtn').onclick = async () => {
    $('#saveBtn').disabled = true;
    const newTitle = $('#logTitle').value.trim();
    const newText = $('#logText').value.trim();
    const selectedType = $('#logType') ? $('#logType').value : 'Sonstiges';

    if (!newTitle || !newText) { 
      alert('Bitte Titel und Text ausfüllen'); 
      $('#saveBtn').disabled = false;
      return; 
    }

    const titleValue = isSpecial ? title : `${selectedType}: ${newTitle}`;
    const updateData = isSpecial ? { text: newText } : { title: titleValue, text: newText };

    const { data: oldEntry, error: fetchError } = await sb.from('entries').select('title, text').eq('id', id).single();
    if(fetchError){ alert('Fehler beim Laden des alten Eintrags: '+fetchError.message); $('#saveBtn').disabled = false; return; }

    const { error } = await sb.from('entries').update(updateData).eq('id', id);
    if (error) { 
      alert('Speichern fehlgeschlagen: ' + error.message); 
      $('#saveBtn').disabled = false;
      return; 
    }

    await logAudit('entries', 'UPDATE', oldEntry, updateData);

    logModal.close();
    const rec = state.records.find(x => x.id === currentDetailId);
    if (rec) await renderLogs(rec);
  };
}


async function deleteLog(logId){
  const { data: oldEntry, error: fetchError } = await sb.from('entries').select('title, text').eq('id', logId).single();
  if(fetchError){ alert('Fehler beim Laden des alten Eintrags: '+fetchError.message); return; }
  const { error } = await sb.from('entries').delete().eq('id', logId);
  if(error){ alert('Löschen fehlgeschlagen: '+error.message); return; }
  await logAudit('entries', 'DELETE', oldEntry, null);
  const rec = state.records.find(x => x.id===currentDetailId);
  if(rec) await renderLogs(rec);
}


    async function exportJSON(){
      if(!sb){ alert('Nicht verbunden.'); return; }
      const { data: persons, error: e1 } = await sb.from('persons').select('*');
      const { data: entries, error: e2 } = await sb.from('entries').select('*');
      if(e1||e2){ alert('Export fehlgeschlagen.'); return; }
      const blob = new Blob([JSON.stringify({ persons, entries }, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'akten-export-' + new Date().toISOString().slice(0,10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    async function importJSON(file){
      const reader = new FileReader();
      reader.onload = async () => {
        try{
          const obj = JSON.parse(reader.result);
          if(Array.isArray(obj)){
            const persons = obj.map(p=>({ id: p.id, name:p.name, phone:p.phone, address:p.address, notes:p.notes, created_at:p.createdAt, updated_at:p.updatedAt }));
            const { error } = await sb.from('persons').upsert(persons, { onConflict: 'id' });
            if(error) throw error;
          } else {
            const persons = (obj.persons||[]).map(p=>({ id:p.id, name:p.name, phone:p.phone, address:p.address, notes:p.notes, created_at:p.created_at||p.createdAt, updated_at:p.updated_at||p.updatedAt }));
            const entries = (obj.entries||[]).map(e=>({ id:e.id, person_id:e.person_id, text:e.text, created_at:e.created_at }));
            if(persons.length){ const { error } = await sb.from('persons').upsert(persons, { onConflict: 'id' }); if(error) throw error; }
            if(entries.length){ const { error } = await sb.from('entries').upsert(entries, { onConflict: 'id' }); if(error) throw error; }
          }
          await refresh();
          alert('Import abgeschlossen.');
        }catch(err){ alert('Import fehlgeschlagen: ' + (err.message||err)); }
      };
      reader.readAsText(file);
    }

    async function resetAll(){
      if(!sb){ alert('Nicht verbunden.'); return; }
      if(!confirm('WIRKLICH ALLES löschen? (Personen & Einträge)')) return;
      await sb.from('entries').delete().neq('id', null);
      await sb.from('persons').delete().neq('id', null);
      await refresh();
    }

    function initRealtime(){
      if(!sb) return;
      sb.channel('realtime-akte')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'persons' }, payload => { refresh(); })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'entries' }, payload => {
          if(currentDetailId){ const rec = state.records.find(x=>x.id===currentDetailId); if(rec) renderLogs(rec); }
        })
        .subscribe();
    }

    const editDialog = $('#editDialog');
    const editForm = $('#editForm');

    function openEdit(id){
      editForm.reset();
      if(id){
        const r = state.records.find(x=>x.id===id);
        if(!r) return;
        $('#editTitle').textContent = 'Akte bearbeiten';
        editForm.id.value = r.id;
        editForm.name.value = r.name;
        editForm.phone.value = r.phone || '';
        editForm.address.value = r.address || '';
        editForm.notes.value = r.notes || '';
      } else {
        $('#editTitle').textContent = 'Neue Person';
        editForm.id.value = '';
      }
      editDialog.showModal();
    }

    editForm.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const submitBtn = e.target.querySelector('button[type=submit]') || e.target.querySelector('input[type=submit]');
      if(submitBtn) submitBtn.disabled = true;
      const data = Object.fromEntries(new FormData(editForm).entries());
      if(!data.name || data.name.trim().length<2){ alert('Bitte einen gültigen Namen eingeben.'); if(submitBtn) submitBtn.disabled = false; return; }
      if(data.phone){ data.phone = cleanPhone(data.phone); }
      if(data.id){ await updateRecord(data.id, data); }
      else { await createRecord(data); }
      editDialog.close();
      if(submitBtn) submitBtn.disabled = false;
    });

    $('#btnConfig').addEventListener('click', configure);
    $('#btnAdd').addEventListener('click', ()=>openEdit());
    $('#btnExport').addEventListener('click', exportJSON);
    $('#btnReset').addEventListener('click', resetAll);
    $('#importFile').addEventListener('change', (e)=>{ const f = e.target.files?.[0]; if(f) importJSON(f); e.target.value=''; });
    $('#search').addEventListener('input', (e)=>{ state.search = e.target.value; render(); });
    $('#sortBy').addEventListener('change', (e)=>{ state.sortBy = e.target.value; render(); });
    $('#btnAddLog').addEventListener('click', (e)=>{ e.preventDefault(); addLog(); });

    window.openDetail = openDetail;
    window.openEdit = openEdit;
    window.removeRecord = removeRecord;
    window.deleteLog = deleteLog;

    initClient();
    refresh();
    document.getElementById('userDisplay').textContent = sessionStorage.getItem('username') || 'Unbekannt';
    initRealtime();

    if(!SUPABASE_URL || !SUPABASE_ANON){
      setTimeout(()=>{
        alert('Supabase ist noch nicht konfiguriert. Klicke oben auf "Verbinden" und trage URL & Anon Key ein.');
      }, 200);
    }
  </script>
