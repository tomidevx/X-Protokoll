<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cayo Aktensystem Login</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <style>
    body {
      background: #000000;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body class="bg-black">
  <div class="bg-gray-900 bg-opacity-90 backdrop-blur-lg rounded-3xl p-8 shadow-2xl w-full max-w-md border border-gray-700">
    <div class="text-center mb-8">
      <i class="fas fa-shield-alt text-6xl text-green-400 mb-4"></i>
      <h2 class="text-3xl font-bold text-white">Cayo Aktensystem</h2>
      <p class="text-gray-400 mt-2">Zugang für autorisiertes Personal</p>
    </div>
    <form id="loginForm" class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Benutzername</label>
        <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-gray-600 bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Benutzername">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-2">Passwort</label>
        <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-600 bg-gray-800 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent" placeholder="Passwort">
      </div>
      <button type="submit" class="w-full py-3 px-4 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl shadow-lg transition duration-300 ease-in-out transform hover:scale-105">
        <i class="fas fa-sign-in-alt mr-2"></i>Login
      </button>
    </form>
    <div id="error" class="mt-4 text-red-400 text-center hidden">
      <i class="fas fa-exclamation-triangle mr-1"></i>Fehlerhafte Anmeldedaten
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js"></script>
<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  const SUPABASE_URL = "https://xkflcxzifnpkhkmlzdoa.supabase.co/";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhrZmxjeHppZm5wa2hrbWx6ZG9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQ1NjA4MDIsImV4cCI6MjA3MDEzNjgwMn0.QizK419VRChe2lHwF1hBldTnxqV2j1c1moScB_YL-dg";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const loginForm = document.getElementById('loginForm');
  const errorDiv = document.getElementById('error');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    const { data, error } = await supabase
      .from('users')
      .select('*')
      .eq('username', username)
      .eq('password', password)
      .single();

    if (data && !error) {
      console.log('Login successful, data:', data);
      sessionStorage.setItem('loggedIn', 'true');
      sessionStorage.setItem('username', data.username);
      sessionStorage.setItem('role', data.role);

      // Log successful login
      await supabase.from('logins').insert({
        username: data.username,
        timestamp: new Date().toISOString(),
        success: true
      });

      if (data.role === 'agent') {
        window.location.href = 'aktensystem.html';
      } else {
        window.location.href = 'logauswahl.html';
      }
    } else {
      console.log('Login failed, error:', error);
      // Log failed login
      await supabase.from('logins').insert({
        username: username,
        timestamp: new Date().toISOString(),
        success: false
      });

      errorDiv.innerText = 'Benutzername oder Passwort falsch!';
      errorDiv.classList.remove('hidden');
    }
  });

  // Check if already logged in
  if (sessionStorage.getItem('loggedIn') === 'true') {
    const role = sessionStorage.getItem('role');
    if (role === 'agent') {
      window.location.href = 'aktensystem.html';
    } else {
      window.location.href = 'logauswahl.html';
    }
  }
</script>
</body>
</html>
</script>
</body>
</html>
